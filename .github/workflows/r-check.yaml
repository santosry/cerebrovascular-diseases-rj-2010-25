name: R checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-renv@v2
      - name: Run unit tests
        shell: Rscript {0}
        run: testthat::test_dir("tests/testthat")
      - name: Parse all R files
        shell: Rscript {0}
        run: |
          files <- list.files(c("R", "scripts"), pattern = "[.]R$", recursive = TRUE, full.names = TRUE)
          invisible(lapply(files, parse))
      - name: Lint core functions
        shell: Rscript {0}
        run: lintr::lint_dir("R")

